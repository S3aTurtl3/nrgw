[workspace]
authors = ["Ore <orealao@mit.edu>"]
channels = ["conda-forge"]
name = "nrgw"
platforms = [{ platform = "linux-64", cuda = "12" }]
version = "0.1.0"

[tasks]

[dependencies]
imageio = ">=2.37.0,<3"
jax = ">=0.10.2,<0.11"
matplotlib = ">=3.11.0,<4"
optax = ">=0.2.8,<0.3"
diffrax = ">=0.7.2,<0.8"
equinox = ">=0.13.7,<0.14"
scipy = ">=1.18.0,<2"
scikit-learn = ">=1.9.0,<2"
pytorch = ">=2.12.0,<3"
numpy = ">=2.5.0,<3"
pytorch-ignite = ">=0.5.2,<0.6"
numpyro = ">=0.21.0,<0.22"
jaxtyping = ">=0.3.7,<0.4"
ipython = ">=9.14.1,<10"
flax = ">=0.12.6,<0.13"
orbax-checkpoint = ">=0.12.0,<0.13"
ax-platform = ">=1.2.4,<2"
jaxlib = { version = "*", build = "*cuda12*" }

[system-requirements]
cuda = "12"

[feature.cuda.target.linux-64.dependencies]
jaxlib = { version = "*", build = "*cuda12*" }

[environments]
default = ["cuda"]
